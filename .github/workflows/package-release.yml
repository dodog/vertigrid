name: Package GNOME extension for Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  package:
    name: Build and upload extension ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext zip

      - name: Bundle extension
        run: |
          bash ./install.sh --bundle

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: vertigrid@dodog.github.com.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
