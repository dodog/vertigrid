name: Package GNOME extension for Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  package:
    name: Build and upload extension ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext zip

      - name: Build extension ZIP
        run: |
          set -euo pipefail
          NAME=vertigrid
          DOMAIN=dodog.github.com
          ZIP_NAME="${NAME}@${DOMAIN}.zip"
          cd src
          for po in po/*.po; do
            [ -f "$po" ] || continue
            lang="$(basename "${po%.po}")"
            mkdir -p "locale/${lang}/LC_MESSAGES"
            msgfmt -o "locale/${lang}/LC_MESSAGES/${NAME}@${DOMAIN}.mo" "$po"
          done
          zip -qr "${GITHUB_WORKSPACE}/${ZIP_NAME}" . -x "po/*"

      - name: Verify archive
        run: |
          NAME=vertigrid
          DOMAIN=dodog.github.com
          ZIP_NAME="${NAME}@${DOMAIN}.zip"
          ls -l "${GITHUB_WORKSPACE}/${ZIP_NAME}"

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v1
        with:
          files: vertigrid@dodog.github.com.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
